# Cloudflare Pages — 與 Dashboard 專案 pauls-experimental-lab 相同名稱（更新同一專案）
# Build: npm run build  →  output: dist
name = "pauls-experimental-lab"
compatibility_date = "2026-07-13"
pages_build_output_dir = "dist"

# Production D1 binding. Keep the binding name exactly DB.
[[d1_databases]]
binding = "DB"
database_name = "pauls-portfolio-cms"
database_id = "42782945-2397-4db8-b4cf-7a2216775de7"

# Optional R2 upload provider. Uncomment after creating the bucket and its
# public custom domain (or r2.dev development URL).
# [[r2_buckets]]
# binding = "MEDIA_BUCKET"
# bucket_name = "pauls-portfolio-media"

[vars]
ASSET_PROVIDER = "r2"
# Configure R2_PUBLIC_BASE_URL and ADMIN_ALLOWED_EMAILS in the Pages Dashboard.
