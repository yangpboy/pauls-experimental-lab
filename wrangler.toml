# Cloudflare Pages — 與 Dashboard 專案 pauls-experimental-lab 相同名稱（更新同一專案）
# Build: npm run build  →  output: dist
name = "pauls-experimental-lab"
compatibility_date = "2026-07-13"
pages_build_output_dir = "dist"

# Add the real database ID returned by `wrangler d1 create` before deploying
# through Wrangler. If Git deployment uses Dashboard bindings, create the same
# binding there with the variable name DB.
[[d1_databases]]
binding = "DB"
database_name = "pauls-portfolio-cms"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

# Optional R2 upload provider. Uncomment after creating the bucket.
# [[r2_buckets]]
# binding = "MEDIA_BUCKET"
# bucket_name = "pauls-portfolio-media"

[vars]
ASSET_PROVIDER = "r2"
# Configure R2_PUBLIC_BASE_URL and ADMIN_ALLOWED_EMAILS in the Pages Dashboard.
